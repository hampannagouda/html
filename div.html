<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div</title>
    <style>
        h1{
            text-align: center;
        }
        body{
            background-color: aqua;
        }
        #parent{
            height: 500px;
            width: 500px;
            background-color: blue;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #child1{
            height: 200px;
            width: 200px;
            background-color: yellow;
            display: flex;
            justify-content: center;
            align-items: center;
        } 
        #child2{
            height: 200px;
            width: 200px;
            background-color: green;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #child3{
            height: 200px;
            width: 200px;
            background-color: rgb(128, 77, 0);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #child4{
            height: 200px;
            width: 200px;
            background-color: rgb(128, 0, 68);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #child5{
            height: 200px;
            width: 200px;
            background-color: rgb(128, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #child6{
            height: 200px;
            width: 200px;
            background-color: rgb(77, 0, 128);
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>Div tag</h1>
    <div id="parent">
        <div id="child1">child1</div>
        <div id="child2">child2</div>
        <hr>
        <div id="child3">child3
            <div id="child4">child4
                <div id="child5">child5
                    <div id="child6">child6</div>
                </div>
            </div>
        </div>
        
    </div>

</html>
