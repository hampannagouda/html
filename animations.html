<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        *{
            background: lightgoldenrodyellow;
        }
        h1{
            text-transform: uppercase;
            text-align: center;
            color: brown;
        }
        div{
            height: 400px;
            width: 400px;
            background-color: greenyellow;
            position: absolute;
            left: 100px;
            top: 200px;
            animation: champions 3s linear 1s 5;
            animation-direction: alternate;
        }
        @keyframes champions {
            /* from{
                background-color: red;  
            }to{
                background-color: hotpink;
                border-radius: 50%;
                transform: rotate(360deg);
            } */
             0%{
                background-color: greenyellow;
                position: relative;
                top: 0px;
                left: 0px;
             }
             25%{
                top: 0px;
                left: 300px;
                position: relative;
                background-color: red;
             }
             50%{
                top: 300px;
                left: 300px;
                position: relative;
                background-color: hotpink;
             }
             75%{
                top: 300px;
                left: 0px;
                position: relative;
                background-color: goldenrod;
             }
             100%{
                background-color: yellow;
                position: relative;
                top: 0px;
                left: 0px;
             }
        }

    </style>
</head>
<body>
    <h1>animation in css</h1>
    <hr>
    <div>

    </div>
</body>
</html>
