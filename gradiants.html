<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        body>div:nth-child(4){
            width: 200px;
            height: 200px;
            background-image: linear-gradient( yellow 50%,red 20%);
        }
        body>div:nth-child(6){
            width: 200px;
            height: 200px;
            background-image: repeating-linear-gradient(yellow 0%,yellow 20%, green 20%, green 40%);
        }
        body>div:nth-child(8){
            width: 200px;
            height: 200px;
            background-image: radial-gradient(circle, red, yellow);
        }
        body>div:nth-child(10){
            width: 200px;
            height: 200px;
            background-image: repeating-radial-gradient(  yellow 10px,yellow 20px, green 0px, green 30px);
        }
        body>div:nth-child(12){
            width: 200px;
            height: 200px;
            background-image: conic-gradient(red, yellow, green);
        }
        body>div:nth-child(14){
            width: 200px;
            height: 200px;
            background-image: repeating-conic-gradient(red, yellow 10deg, green 10deg, blue 20deg);
        }
        body>div:nth-child(16){
            width: 100%;
            height: 600px;
            background-image: linear-gradient(orange 0%,orange 33.33%,white 33.33%, white 66.66%, green 66.66%);
        }
        body>div:nth-child(16)>div{
            width: 200px;
            height: 200px;
            background-image: repeating-conic-gradient(blue 0%, blue 2%, white 2%, white 4%);
            border-radius: 50%;
            position: relative;
            left : 50%;
            top: 50%;
        }

    </style>
